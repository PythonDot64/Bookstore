<!DOCTYPE html>

<html lang="en">
  <head>
    <!-- Import style.css -->
    <link href="static\styles.css" rel="stylesheet" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Import Bootstrap (https://getbootstrap.com/)-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <title>Library: {% block title %}{% endblock %}</title>
  </head>
  <body>
    <nav class="bg-light border navbar navbar-expand-md navbar-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Home</a>
        <button
          aria-controls="navbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
          class="navbar-toggler"
          data-bs-target="#navbar"
          data-bs-toggle="collapse"
          type="button"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar">
          {% if session["user_id"] %}
          <ul class="navbar-nav me-auto mt-2">
            <li class="nav-item">
              <form action="/cart" method="get">
                <button class="nav-link">Borrowed books</button>
              </form>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/credits">Credits</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/license">license</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mt-2">
            <form class="form-inline" action="/search" method="get">
              <div class="form-group d-flex align-items-center">
                <input
                  class="search form-control"
                  type="search"
                  placeholder="Search"
                  aria-label="Search"
                  name="q"
                />
                <div class="dropdown">
                  <button
                    class="btn btn-outline-success dropdown-toggle"
                    type="button"
                    id="dropdownMenu2"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    Search
                  </button>
                  <ul class="dropdown-menu" aria-labelledby="dropdownMenu2">
                    <h6 class="dropdown-header">Sort by:</h6>
                    <li>
                      <button
                        class="dropdown-item"
                        name="sort"
                        value="random"
                        type="submit"
                      >
                        Random (somewhat)
                      </button>
                    </li>
                    <li>
                      <button
                        class="dropdown-item"
                        name="sort"
                        value="title"
                        type="submit"
                      >
                        Title
                      </button>
                    </li>
                    <li>
                      <button
                        class="dropdown-item"
                        name="sort"
                        value="rating1"
                        type="submit"
                      >
                        Rating (best to worst)
                      </button>
                    </li>
                    <li>
                      <button
                        class="dropdown-item"
                        name="sort"
                        value="rating2"
                        type="submit"
                      >
                        Rating (worst to best)
                      </button>
                    </li>
                  </ul>
                </div>
              </div>
            </form>
            <li class="nav-item">
              <a class="nav-link" href="/logout">Log Out</a>
            </li>
          </ul>
          {% else %}
          <ul class="navbar-nav ms-auto mt-2">
            <li class="nav-item">
              <a class="nav-link" href="/login">Log In</a>
            </li>
          </ul>
          {% endif %}
        </div>
      </div>
    </nav>
    <div class="container py-5 text-center align-items-center flex-column">
      {% block main %}
      <footer
        style="
          display: table;
          text-align: center;
          margin-left: auto;
          margin-right: auto;
        "
      >
        <h4>
          <a href="/credits">credits</a>
        </h4>
        <a href="/license"><h4>license</h4></a>
      </footer>
      {% endblock %}
    </div>
  </body>
</html>
