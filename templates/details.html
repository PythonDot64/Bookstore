{% extends "layout.html" %} {% block title %}Home{% endblock %} {% block main %}
<h1>{{ book.title }}</h1>
<hr />
<div class="d-flex align-items-center">
  <div class="d-flex justify-content-center flex-column">
    <img
      alt="{{ book.title }}"
      src="{{ img }}"
      class="rounded float-start img-thumbnail resizeLarge"
    />
    <form action="/cart" method="post">
      <input type="hidden" name="book" value="{{ id }}" />
      <button class="btn btn-primary" style="margin-top: 50px">Borrow</button>
    </form>
  </div>
  <div class="mb-3 d-flex flex-column align-items-center">
    <h1 class="mb-3 h1-description">Description:</h1>
    {% if work.description %}
    <p class="p-description">{{ work.description.value }}</p>
    {% else %}
    <p class="p-description">No description available</p>
    {% endif %}
  </div>
</div>
{% endblock %}
