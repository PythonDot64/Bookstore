{% extends "layout.html" %}

{% block title %}Register{% endblock %}

{% block main %}
    <form action="/login" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" placeholder="Username" name="username" type="text">
        </div>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" placeholder="Password" name="password" type="password">
        </div>
        <button class="btn btn-primary" type="submit">Submit</button>
    </form>
    <hr>
    <p>Don't have an account? <a href="/register">register</a></p>
{% endblock %}
